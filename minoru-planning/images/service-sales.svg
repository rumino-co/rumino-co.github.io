<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff7ed"/>
      <stop offset="1" stop-color="#ffedd5"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="800" height="600" fill="url(#sky2)"/>

  <!-- Sun & cloud -->
  <circle cx="660" cy="100" r="64" fill="#fde68a" opacity="0.5"/>
  <circle cx="660" cy="100" r="42" fill="#fcd34d"/>
  <g fill="#ffffff" opacity="0.9">
    <ellipse cx="180" cy="110" rx="52" ry="22"/>
    <ellipse cx="140" cy="120" rx="34" ry="16"/>
    <ellipse cx="220" cy="120" rx="36" ry="16"/>
  </g>

  <!-- Field -->
  <path d="M0 300 L800 300 L800 600 L0 600 Z" fill="#a7f3d0"/>

  <!-- Plots (perspective grid) -->
  <polygon points="120,340 680,340 780,560 20,560" fill="#fff7ed" stroke="#f97316" stroke-width="5"/>
  <line x1="306" y1="340" x2="273" y2="560" stroke="#f97316" stroke-width="4"/>
  <line x1="493" y1="340" x2="526" y2="560" stroke="#f97316" stroke-width="4"/>
  <line x1="90" y1="450" x2="710" y2="450" stroke="#f97316" stroke-width="4"/>

  <!-- House on one plot -->
  <g transform="translate(540 360)">
    <polygon points="-10,0 60,-44 130,0" fill="#ea580c"/>
    <rect x="0" y="0" width="120" height="78" fill="#ffffff"/>
    <rect x="50" y="34" width="26" height="44" fill="#c2410c" rx="2"/>
    <rect x="14" y="20" width="24" height="24" fill="#ffedd5" stroke="#ea580c" stroke-width="3"/>
    <rect x="84" y="20" width="24" height="24" fill="#ffedd5" stroke="#ea580c" stroke-width="3"/>
  </g>

  <!-- Signboard -->
  <g transform="translate(150 330)">
    <rect x="52" y="60" width="14" height="130" fill="#7c5f4c" rx="4"/>
    <rect x="-20" y="-30" width="160" height="100" fill="#ffffff" stroke="#f97316" stroke-width="6" rx="10"/>
    <text x="60" y="18" text-anchor="middle" font-family="'M PLUS Rounded 1c','Hiragino Maru Gothic ProN',Meiryo,sans-serif" font-size="38" font-weight="700" fill="#ea580c">分譲地</text>
    <text x="60" y="52" text-anchor="middle" font-family="'M PLUS Rounded 1c','Hiragino Maru Gothic ProN',Meiryo,sans-serif" font-size="20" font-weight="500" fill="#f97316">好評 販売中</text>
  </g>

  <!-- Trees -->
  <g transform="translate(720 320)">
    <rect x="-5" y="0" width="10" height="22" fill="#7c5f4c" rx="3"/>
    <circle cx="0" cy="-20" r="26" fill="#4ade80"/>
    <circle cx="-16" cy="-6" r="16" fill="#86efac"/>
    <circle cx="16" cy="-6" r="16" fill="#22c55e"/>
  </g>
  <g transform="translate(60 310) scale(0.8)">
    <rect x="-5" y="0" width="10" height="22" fill="#7c5f4c" rx="3"/>
    <circle cx="0" cy="-20" r="26" fill="#4ade80"/>
    <circle cx="-16" cy="-6" r="16" fill="#86efac"/>
    <circle cx="16" cy="-6" r="16" fill="#22c55e"/>
  </g>
</svg>
